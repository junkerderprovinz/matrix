# =============================================================================
# build.yml — Matrix All-in-One Docker Image Build & Push
#
# Triggers:
#   - Hourly cron: checks for new Synapse releases and builds if needed
#   - workflow_dispatch: manual trigger (optionally force-rebuild)
#   - push to main: always builds and pushes latest
#
# Output: multi-arch image (linux/amd64, linux/arm64) pushed to
#         ghcr.io/junkerderprovinz/matrix — and, once the DOCKERHUB_USERNAME
#         variable + DOCKERHUB_TOKEN secret are set together, mirrored to
#         docker.io/<DOCKERHUB_USERNAME>/matrix — with tags:
#           :latest
#           :v1.x.y       (full Synapse version tag)
#           :1.x.y        (without leading 'v')
# =============================================================================

name: Build & Push Docker Image

on:
  # Run every hour to catch new Synapse releases
  schedule:
    - cron: '0 * * * *'

  # Allow manual re-runs from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if image already exists for this tag'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Build on every push to main (e.g. after updating Dockerfile or scripts)
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'unraid-template.xml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/junkerderprovinz/matrix
  # Pinned component versions — update these to bump non-Synapse components
  ELEMENT_VERSION: v1.11.92
  SYNAPSE_ADMIN_VERSION: "0.10.3"
  S6_OVERLAY_VERSION: "3.2.0.2"
  # Opt into Node.js 24 for all JavaScript actions to silence the
  # deprecation warning about Node.js 20. Safe — runner already ships
  # Node 24, the actions run on it without code changes.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Determine the latest Synapse release tag
      # -----------------------------------------------------------------------
      - name: Get latest Synapse release tag
        id: synapse
        env:
          # Authenticated requests get 5000 req/h instead of 60 — essential
          # for hourly schedule runs sharing a GitHub-Actions egress IP pool.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=""
          for attempt in 1 2 3 4 5; do
            TAG=$(curl -fsSL --max-time 15 \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/element-hq/synapse/releases/latest" \
              | jq -r '.tag_name' 2>/dev/null) || TAG=""
            if [ -n "${TAG}" ] && [ "${TAG}" != "null" ]; then
              break
            fi
            echo "::warning::Attempt ${attempt}: empty/null tag, retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done

          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            echo "::error::Could not determine latest Synapse release tag after 5 attempts."
            exit 1
          fi

          # Strip leading 'v' for the version-without-v tag
          TAG_BARE="${TAG#v}"

          echo "tag=${TAG}"      >> "${GITHUB_OUTPUT}"
          echo "tag_bare=${TAG_BARE}" >> "${GITHUB_OUTPUT}"
          echo "Synapse latest release: ${TAG}"

      # -----------------------------------------------------------------------
      # Check whether we have already published an image for this exact tag.
      # If so, skip the build (unless force_rebuild=true or it's a push event).
      # -----------------------------------------------------------------------
      - name: Check if image already exists
        id: check
        run: |
          TAG="${{ steps.synapse.outputs.tag }}"
          IMAGE="${{ env.IMAGE_NAME }}:${TAG}"

          SKIP="false"
          FORCE="${{ github.event.inputs.force_rebuild }}"
          EVENT="${{ github.event_name }}"

          if [ "${EVENT}" = "push" ]; then
            echo "Push event — always rebuilding."
            SKIP="false"
          elif [ "${FORCE}" = "true" ]; then
            echo "Force rebuild requested — skipping existence check."
            SKIP="false"
          else
            # docker manifest inspect returns 0 if the manifest exists
            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image ${IMAGE} already exists — skipping build."
              SKIP="true"
            else
              echo "Image ${IMAGE} not found — will build."
              SKIP="false"
            fi
          fi

          echo "skip=${SKIP}" >> "${GITHUB_OUTPUT}"

      # -----------------------------------------------------------------------
      # Authenticate to GitHub Container Registry
      # -----------------------------------------------------------------------
      - name: Log in to GHCR
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Docker Hub mirror — active only once DOCKERHUB_USERNAME (variable) and
      # DOCKERHUB_TOKEN (secret) are set together; otherwise skipped (GHCR-only).
      # -----------------------------------------------------------------------
      - name: Log in to Docker Hub
        if: steps.check.outputs.skip != 'true' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Set up QEMU for multi-arch emulation (required for arm64 builds)
      # -----------------------------------------------------------------------
      - name: Set up QEMU
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      # -----------------------------------------------------------------------
      # Set up Docker Buildx for multi-platform builds
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Build the tag list: GHCR always, Docker Hub only when mirroring is on.
      # -----------------------------------------------------------------------
      - name: Compose image tags
        id: tags
        if: steps.check.outputs.skip != 'true'
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          SYN_TAG: ${{ steps.synapse.outputs.tag }}
          SYN_TAG_BARE: ${{ steps.synapse.outputs.tag_bare }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:${SYN_TAG}"
            echo "${IMAGE_NAME}:${SYN_TAG_BARE}"
            if [ -n "${DOCKERHUB_USERNAME}" ]; then
              DH="docker.io/${DOCKERHUB_USERNAME}/matrix"
              echo "${DH}:latest"
              echo "${DH}:${SYN_TAG}"
              echo "${DH}:${SYN_TAG_BARE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Smoke-test gate (amd64): build the image, boot it against a throwaway
      # PostgreSQL, and require Synapse's /health to answer before anything is
      # pushed. A green Docker build only proves the image *builds* — this
      # proves the container actually *starts* (catches an s6 / config-gen /
      # Synapse boot crash before :latest, including the hourly auto-builds).
      # amd64-only on purpose: Synapse's first-run key generation + migrations
      # are too slow under arm64 QEMU emulation for a CI gate.
      # -----------------------------------------------------------------------
      - name: Build amd64 image for smoke test
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: matrix:smoke-amd64
          build-args: |
            SYNAPSE_VERSION=${{ steps.synapse.outputs.tag }}
            ELEMENT_VERSION=${{ env.ELEMENT_VERSION }}
            SYNAPSE_ADMIN_VERSION=${{ env.SYNAPSE_ADMIN_VERSION }}
            S6_OVERLAY_VERSION=${{ env.S6_OVERLAY_VERSION }}
          cache-from: type=gha

      - name: Smoke test — amd64 must boot and serve /health
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker network create mx-smoke-net
          # Synapse requires the database to use the C collation; the stock
          # postgres image defaults to a libc locale, so pin it via initdb args.
          docker run -d --name mx-smoke-pg --network mx-smoke-net \
            -e POSTGRES_USER=synapse -e POSTGRES_PASSWORD=smoke \
            -e POSTGRES_DB=synapse \
            -e POSTGRES_INITDB_ARGS="--encoding=UTF-8 --lc-collate=C --lc-ctype=C" \
            postgres:16-alpine
          docker run -d --name mx-smoke --network mx-smoke-net -p 8008:8008 \
            -e SERVER_NAME=smoke.local \
            -e POSTGRES_HOST=mx-smoke-pg -e POSTGRES_USER=synapse \
            -e POSTGRES_PASSWORD=smoke -e POSTGRES_DB=synapse \
            matrix:smoke-amd64
          cleanup() {
            docker rm -f mx-smoke mx-smoke-pg >/dev/null 2>&1 || true
            docker network rm mx-smoke-net >/dev/null 2>&1 || true
          }
          # First boot generates config + signing keys and runs DB migrations —
          # give it a generous budget.
          for i in $(seq 1 180); do
            if curl -fsS -o /dev/null http://localhost:8008/health; then
              echo "✅ Synapse /health responded after ${i}s"
              cleanup
              exit 0
            fi
            if [ -z "$(docker ps -q --filter name=mx-smoke$)" ]; then
              echo "❌ container exited early — logs:"; docker logs mx-smoke || true
              cleanup; exit 1
            fi
            sleep 1
          done
          echo "❌ /health did not respond within 180s — logs:"
          docker logs mx-smoke || true
          cleanup
          exit 1

      # -----------------------------------------------------------------------
      # Build and push the multi-arch image
      # -----------------------------------------------------------------------
      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            SYNAPSE_VERSION=${{ steps.synapse.outputs.tag }}
            ELEMENT_VERSION=${{ env.ELEMENT_VERSION }}
            SYNAPSE_ADMIN_VERSION=${{ env.SYNAPSE_ADMIN_VERSION }}
            S6_OVERLAY_VERSION=${{ env.S6_OVERLAY_VERSION }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Matrix All-in-One
            org.opencontainers.image.description=Synapse + coturn + Element Web + Synapse-Admin
            org.opencontainers.image.source=https://github.com/junkerderprovinz/matrix
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.synapse.outputs.tag }}

      # -----------------------------------------------------------------------
      # Log a summary for easy visibility in the Actions UI
      # -----------------------------------------------------------------------
      - name: Build summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "### Skipped — image already up to date" >> "${GITHUB_STEP_SUMMARY}"
            echo "Tag: \`${{ steps.synapse.outputs.tag }}\`" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "### Published" >> "${GITHUB_STEP_SUMMARY}"
            echo "| Tag | Image |" >> "${GITHUB_STEP_SUMMARY}"
            echo "|-----|-------|" >> "${GITHUB_STEP_SUMMARY}"
            echo "| latest | \`${{ env.IMAGE_NAME }}:latest\` |" >> "${GITHUB_STEP_SUMMARY}"
            echo "| ${{ steps.synapse.outputs.tag }} | \`${{ env.IMAGE_NAME }}:${{ steps.synapse.outputs.tag }}\` |" >> "${GITHUB_STEP_SUMMARY}"
            echo "| ${{ steps.synapse.outputs.tag_bare }} | \`${{ env.IMAGE_NAME }}:${{ steps.synapse.outputs.tag_bare }}\` |" >> "${GITHUB_STEP_SUMMARY}"
          fi
