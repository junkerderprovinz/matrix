# =============================================================================
# lighttpd.conf — serves Element Web and Synapse-Admin as static files
#
# Paths:
#   http://<host>:8080/element/   — Element Web (Matrix client)
#   http://<host>:8080/admin/     — Synapse-Admin (admin UI)
#   http://<host>:8080/           — redirect to /element/
#
# Both apps are Single-Page Applications (SPAs): any path under /element/ or
# /admin/ that does not correspond to a real file must be rewritten to
# index.html so the client-side router can handle it.
# =============================================================================

# --- Server basics ------------------------------------------------------------
server.port          = 8080
server.bind          = "0.0.0.0"
server.document-root = "/var/www/html"

# Lighttpd needs a writable file for its PID and server state.
server.pid-file      = "/run/lighttpd.pid"

# Log to /dev/stderr so Docker log driver captures it
server.errorlog      = "/dev/stderr"
accesslog.filename   = "/dev/stdout"

# Privilege handling:
# We intentionally do NOT set server.username/server.groupname here.
# When lighttpd drops privileges, it loses the ability to open /dev/stderr
# (the inherited file descriptor from PID 1 is owned by root and cannot be
# re-opened via the symlink path by the dropped user). See:
# https://redmine.lighttpd.net/issues/2731
# This is a static-file server only — no PHP, no CGI, no upload handlers —
# so running as root inside the container has no meaningful security impact
# beyond what Docker isolation already provides. This matches the upstream
# behaviour of the official nginx and Apache httpd Docker images.
# Containers must always be operated behind the reverse proxy (NPM).

# --- Modules ------------------------------------------------------------------
server.modules = (
    "mod_access",
    "mod_accesslog",
    "mod_alias",
    "mod_compress",
    "mod_rewrite",
    "mod_redirect",
    "mod_setenv"
)

# --- MIME types ---------------------------------------------------------------
mimetype.assign = (
    ".html"  => "text/html; charset=utf-8",
    ".htm"   => "text/html; charset=utf-8",
    ".css"   => "text/css; charset=utf-8",
    ".js"    => "application/javascript; charset=utf-8",
    ".mjs"   => "application/javascript; charset=utf-8",
    ".json"  => "application/json; charset=utf-8",
    ".svg"   => "image/svg+xml; charset=utf-8",
    ".png"   => "image/png",
    ".jpg"   => "image/jpeg",
    ".jpeg"  => "image/jpeg",
    ".gif"   => "image/gif",
    ".ico"   => "image/x-icon",
    ".woff"  => "font/woff",
    ".woff2" => "font/woff2",
    ".ttf"   => "font/ttf",
    ".eot"   => "application/vnd.ms-fontobject",
    ".webp"  => "image/webp",
    ".wasm"  => "application/wasm",
    ".txt"   => "text/plain; charset=utf-8",
    ".map"   => "application/json"
)

# --- Compression --------------------------------------------------------------
compress.cache-dir  = "/tmp/lighttpd-cache"
compress.filetype   = (
    "text/html",
    "text/css",
    "application/javascript",
    "application/json",
    "image/svg+xml"
)

# --- Security headers ---------------------------------------------------------
setenv.add-response-header = (
    "X-Frame-Options"           => "SAMEORIGIN",
    "X-Content-Type-Options"    => "nosniff",
    "X-XSS-Protection"          => "1; mode=block",
    "Referrer-Policy"           => "strict-origin-when-cross-origin"
)

# --- Root redirect ------------------------------------------------------------
# Visiting http://<host>:8080/ redirects to /element/ for convenience.
$HTTP["url"] =~ "^/$" {
    url.redirect = ( "^/" => "/element/" )
}

# --- SPA fallback for Element -------------------------------------------------
# If a request under /element/ does not match a real file, serve index.html.
# This is required for client-side routing in React/Vue SPAs.
$HTTP["url"] =~ "^/element/" {
    server.document-root = "/var/www/html"
    url.rewrite-if-not-file = (
        "^(/element/)(.*)$" => "/element/index.html"
    )
}

# --- SPA fallback for Synapse-Admin -------------------------------------------
$HTTP["url"] =~ "^/admin/" {
    server.document-root = "/var/www/html"
    url.rewrite-if-not-file = (
        "^(/admin/)(.*)$" => "/admin/index.html"
    )
}

# --- Static asset caching -----------------------------------------------------
# Cache immutable assets (hashed filenames) aggressively.
$HTTP["url"] =~ "\.(css|js|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|webp|wasm)(\?.*)?$" {
    expire.url = ( "" => "access plus 1 years" )
}
