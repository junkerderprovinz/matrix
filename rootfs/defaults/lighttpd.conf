# =============================================================================
# lighttpd.conf — serves Element Web, Synapse-Admin, and well-known files
#
# Paths:
#   http://<host>:8080/element/                    — Element Web (Matrix client)
#   http://<host>:8080/admin/                      — Synapse-Admin (admin UI)
#   http://<host>:8080/                            — redirect to /element/
#   http://<host>:8080/.well-known/matrix/server   — Federation well-known (JSON)
#   http://<host>:8080/.well-known/matrix/client   — Client discovery well-known (JSON)
#
# Both apps are Single-Page Applications (SPAs): any path under /element/ or
# /admin/ that does not correspond to a real file must be rewritten to
# index.html so the client-side router can handle it.
# =============================================================================

# --- Server basics ------------------------------------------------------------
server.port          = 8080
server.bind          = "0.0.0.0"
server.document-root = "/var/www/html"

# Lighttpd needs a writable file for its PID and server state.
server.pid-file      = "/run/lighttpd.pid"

# Log to /dev/stderr so Docker log driver captures it
server.errorlog      = "/dev/stderr"
accesslog.filename   = "/dev/stdout"

# Run as www-data (uid 33) — it has read access to /var/www/html
server.username  = "www-data"
server.groupname = "www-data"

# --- Modules ------------------------------------------------------------------
server.modules = (
    "mod_access",
    "mod_accesslog",
    "mod_alias",
    "mod_compress",
    "mod_rewrite",
    "mod_redirect",
    "mod_setenv"
)

# --- MIME types ---------------------------------------------------------------
mimetype.assign = (
    ".html"  => "text/html; charset=utf-8",
    ".htm"   => "text/html; charset=utf-8",
    ".css"   => "text/css; charset=utf-8",
    ".js"    => "application/javascript; charset=utf-8",
    ".mjs"   => "application/javascript; charset=utf-8",
    ".json"  => "application/json; charset=utf-8",
    ".svg"   => "image/svg+xml; charset=utf-8",
    ".png"   => "image/png",
    ".jpg"   => "image/jpeg",
    ".jpeg"  => "image/jpeg",
    ".gif"   => "image/gif",
    ".ico"   => "image/x-icon",
    ".woff"  => "font/woff",
    ".woff2" => "font/woff2",
    ".ttf"   => "font/ttf",
    ".eot"   => "application/vnd.ms-fontobject",
    ".webp"  => "image/webp",
    ".wasm"  => "application/wasm",
    ".txt"   => "text/plain; charset=utf-8",
    ".map"   => "application/json"
)

# --- Compression --------------------------------------------------------------
compress.cache-dir  = "/tmp/lighttpd-cache"
compress.filetype   = (
    "text/html",
    "text/css",
    "application/javascript",
    "application/json",
    "image/svg+xml"
)

# --- Security headers ---------------------------------------------------------
setenv.add-response-header = (
    "X-Frame-Options"           => "SAMEORIGIN",
    "X-Content-Type-Options"    => "nosniff",
    "X-XSS-Protection"          => "1; mode=block",
    "Referrer-Policy"           => "strict-origin-when-cross-origin"
)

# --- Root redirect ------------------------------------------------------------
# Visiting http://<host>:8080/ redirects to /element/ for convenience.
$HTTP["url"] =~ "^/$" {
    url.redirect = ( "^/" => "/element/" )
}

# --- Well-known federation and client discovery endpoints --------------------
# These files are rendered at container start by 10-config.sh and contain
# the Matrix federation and client discovery JSON for the configured SERVER_NAME.
# Content-Type must be application/json and CORS must be open for federation.
alias.url += ( "/.well-known/matrix/server" => "/var/www/well-known/server" )
alias.url += ( "/.well-known/matrix/client" => "/var/www/well-known/client" )

$HTTP["url"] =~ "^/\.well-known/matrix/" {
    setenv.add-response-header = (
        "Content-Type"                => "application/json",
        "Access-Control-Allow-Origin" => "*"
    )
}

# --- SPA fallback for Element -------------------------------------------------
# If a request under /element/ does not match a real file, serve index.html.
# This is required for client-side routing in React/Vue SPAs.
$HTTP["url"] =~ "^/element/" {
    server.document-root = "/var/www/html"
    url.rewrite-if-not-file = (
        "^(/element/)(.*)$" => "/element/index.html"
    )
}

# --- SPA fallback for Synapse-Admin -------------------------------------------
$HTTP["url"] =~ "^/admin/" {
    server.document-root = "/var/www/html"
    url.rewrite-if-not-file = (
        "^(/admin/)(.*)$" => "/admin/index.html"
    )
}

# --- Static asset caching -----------------------------------------------------
# Cache immutable assets (hashed filenames) aggressively.
$HTTP["url"] =~ "\.(css|js|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|webp|wasm)(\?.*)?$" {
    expire.url = ( "" => "access plus 1 years" )
}
